<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>__OG_TITLE__</title>
    <meta name="description" content="__OG_DESCRIPTION__">
    <!-- Open Graph / Facebook, WhatsApp -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="__OG_TITLE__">
    <meta property="og:description" content="__OG_DESCRIPTION__">
    <meta property="og:image" content="__OG_IMAGE__">
    <meta property="og:url" content="__OG_URL__">
    <meta property="og:site_name" content="__OG_TITLE__">
    <meta property="og:locale" content="es_MX">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="__OG_TITLE__">
    <meta name="twitter:description" content="__OG_DESCRIPTION__">
    <meta name="twitter:image" content="__OG_IMAGE__">

    <!--
      OPTIMIZACIONES DE RED: preconnect abre TCP+TLS en paralelo con el
      parsing del HTML, ahorrando 150-400ms por origen en la primera visita.
    -->
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Tailwind CDN — ESENCIAL: toda la UI depende de las clases de Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!--
      Solo los pesos que realmente usa el diseño (se elimino wght@300 que era innecesario).
      font-display=swap → texto visible de inmediato mientras Inter carga.
    -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

    <style>
        /* Prevent any horizontal scroll / layout shift */
        html {
            overflow-x: hidden;
            max-width: 100vw;
            overscroll-behavior-x: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            max-width: 100vw;
            touch-action: pan-y;
            /* only vertical swipes */
            overscroll-behavior-x: none;
        }

        /* Prevent pull-to-refresh horizontal drift */
        #root {
            overflow-x: hidden;
            max-width: 100vw;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
