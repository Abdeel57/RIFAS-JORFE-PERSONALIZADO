<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifas Nao</title>

    <!--
      ┌─────────────────────────────────────────────────────────────────────┐
      │  OPTIMIZACIONES DE RED                                              │
      │  preconnect abre el TCP+TLS handshake en paralelo con el parsing   │
      │  del HTML, ahorrando ~150-400ms por origen en la primera visita.   │
      └─────────────────────────────────────────────────────────────────────┘
    -->
    <!-- Google Fonts (DNS + TLS pre-calentados) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Backend API de Railway (DNS + TLS pre-calentados) -->
    <link rel="preconnect" href="https://paginas-production.up.railway.app">

    <!--
      font-display=swap → el texto se muestra con la fuente del sistema
      mientras Inter carga (evita FOIT = Flash of Invisible Text).
      Solo cargamos los pesos que realmente usamos.
    -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

    <style>
        /* Prevent any horizontal scroll / layout shift */
        html {
            overflow-x: hidden;
            max-width: 100vw;
            overscroll-behavior-x: none;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            overflow-x: hidden;
            max-width: 100vw;
            touch-action: pan-y;
            overscroll-behavior-x: none;
        }

        /* Prevent pull-to-refresh horizontal drift */
        #root {
            overflow-x: hidden;
            max-width: 100vw;
        }

        /* Skeleton de carga instantáneo mientras React hidrata (evita pantalla blanca) */
        #root:empty::before {
            content: '';
            display: block;
            position: fixed;
            inset: 0;
            background: #f8fafc;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
