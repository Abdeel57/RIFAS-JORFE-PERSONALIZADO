[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npm run prisma:generate", "npm run build"]

[start]
cmd = "node dist/scripts/resolve-failed-migration.js && npx prisma migrate deploy && node dist/index.js"

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "/usr/bin/chromium"
